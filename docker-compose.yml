services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: portfolio-dev
    volumes:
      - .:/app
    ports:
      - "${PORT:-3000}:80"
    stdin_open: true
    tty: true

  proxy:
    image: nginx:alpine
    container_name: portfolio-proxy
    network_mode: "service:app"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - app
